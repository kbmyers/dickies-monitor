name: Dickies Size M Dashboard

on:
  schedule:
    # Every 4 hours. GitHub may delay scheduled runs up to ~15 min under load.
    - cron: '0 */4 * * *'
  workflow_dispatch: # lets you trigger manually from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Serialize concurrent runs so a manual trigger doesn't fight the schedule
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Generate dashboard
        run: python check_dickies.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
